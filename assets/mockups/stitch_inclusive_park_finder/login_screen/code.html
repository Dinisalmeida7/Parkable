<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - ParkAble</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-container": "#cd8f00",
                    "primary-fixed-dim": "#88d982",
                    "on-secondary-fixed": "#001c3a",
                    "secondary-container": "#54a0fe",
                    "on-background": "#1a1c1c",
                    "surface-container-high": "#e8e8e8",
                    "outline-variant": "#becab9",
                    "on-surface": "#1a1c1c",
                    "on-tertiary": "#ffffff",
                    "primary": "#1b6d24",
                    "tertiary-fixed-dim": "#ffba38",
                    "surface-dim": "#dadada",
                    "primary-fixed": "#a3f69c",
                    "on-surface-variant": "#3f4a3c",
                    "surface-container-low": "#f3f3f3",
                    "error-container": "#ffdad6",
                    "inverse-primary": "#88d982",
                    "on-secondary-container": "#003567",
                    "surface-bright": "#f9f9f9",
                    "on-tertiary-fixed-variant": "#604100",
                    "surface-container": "#eeeeee",
                    "on-secondary": "#ffffff",
                    "on-tertiary-fixed": "#281900",
                    "on-primary-fixed": "#002204",
                    "surface-tint": "#1b6d24",
                    "tertiary": "#7e5700",
                    "on-secondary-fixed-variant": "#004786",
                    "on-primary-container": "#003c0a",
                    "surface-container-highest": "#e2e2e2",
                    "secondary-fixed-dim": "#a5c8ff",
                    "tertiary-fixed": "#ffdeac",
                    "background": "#f9f9f9",
                    "primary-container": "#5dac5b",
                    "surface": "#f9f9f9",
                    "outline": "#6f7a6b",
                    "secondary": "#005faf",
                    "secondary-fixed": "#d4e3ff",
                    "on-error-container": "#93000a",
                    "on-primary": "#ffffff",
                    "inverse-surface": "#2f3131",
                    "surface-variant": "#e2e2e2",
                    "surface-container-lowest": "#ffffff",
                    "on-error": "#ffffff",
                    "error": "#ba1a1a",
                    "on-primary-fixed-variant": "#005312",
                    "on-tertiary-container": "#462e00",
                    "inverse-on-surface": "#f1f1f1"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": [
                            "Plus Jakarta Sans"
                    ],
                    "body": [
                            "Be Vietnam Pro"
                    ],
                    "label": [
                            "Be Vietnam Pro"
                    ]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: #f9f9f9;
        }
        h1, h2, h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface text-on-surface flex flex-col min-h-screen">
<main class="flex-grow flex flex-col items-center justify-center px-6 relative overflow-hidden">
<div class="absolute inset-0 z-0 overflow-hidden">
<div class="absolute -top-24 -left-24 w-96 h-96 bg-primary-fixed/30 rounded-full blur-[100px]"></div>
<div class="absolute top-1/2 -right-48 w-[500px] h-[500px] bg-secondary-fixed/20 rounded-full blur-[120px]"></div>
</div>
<div class="w-full max-w-md z-10 flex flex-col items-center">
<div class="mb-12 text-center">
<div class="inline-flex items-center justify-center p-4 bg-surface-container-lowest rounded-lg shadow-sm mb-6">
<span class="material-symbols-outlined text-primary text-5xl" data-icon="park">park</span>
</div>
<h1 class="text-4xl font-extrabold text-primary tracking-tighter mb-2">ParkAble</h1>
<p class="text-on-surface-variant font-medium">Access nature's sanctuary, for everyone.</p>
</div>
<div class="w-full bg-surface-container-lowest/80 backdrop-blur-xl rounded-lg p-8 shadow-[0_24px_48px_-12px_rgba(0,0,0,0.06)] border border-surface-container">
<form class="space-y-6">
<div>
<label class="block text-sm font-semibold text-on-surface-variant ml-2 mb-2" for="email">Email address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60" data-icon="mail">mail</span>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-highest border-none rounded-md focus:ring-2 focus:ring-primary focus:bg-primary-fixed-dim/20 transition-all placeholder:text-on-surface-variant/40" id="email" name="email" placeholder="name@example.com" type="email"/>
</div>
</div>
<div>
<div class="flex items-center justify-between ml-2 mb-2">
<label class="block text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<a class="text-sm font-semibold text-secondary hover:text-on-secondary-fixed-variant transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60" data-icon="lock">lock</span>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-highest border-none rounded-md focus:ring-2 focus:ring-primary focus:bg-primary-fixed-dim/20 transition-all placeholder:text-on-surface-variant/40" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/60" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<button class="w-full h-14 bg-gradient-to-r from-primary to-primary-container text-on-primary font-bold rounded-full text-lg shadow-lg shadow-primary/20 active:scale-[0.98] transition-all duration-150" type="submit">
                        Login
                    </button>
</form>
<div class="mt-8 pt-8 border-t border-surface-container flex flex-col items-center gap-4">
<p class="text-on-surface-variant text-sm">Don't have an account?</p>
<a class="inline-flex items-center justify-center px-8 h-12 font-bold rounded-full transition-all active:scale-95 bg-primary text-on-primary hover:bg-primary/90" href="#">
                        Register
                    </a>
</div>
</div>
<div class="mt-12 flex items-center gap-6 opacity-60">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="accessible_forward">accessible_forward</span>
<span class="text-xs font-semibold">Inclusive</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="verified_user">verified_user</span>
<span class="text-xs font-semibold">Secure</span>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm" data-icon="eco">eco</span>
<span class="text-xs font-semibold">Eco-friendly</span>
</div>
</div>
</div>
<div class="absolute bottom-0 left-0 w-full p-8 hidden md:flex justify-between items-end">
<div class="max-w-xs">
<p class="text-xs text-on-surface-variant font-medium">© 2024 ParkAble. Designed for universal access to urban nature.</p>
</div>
<div class="flex gap-4">
<div class="w-12 h-12 rounded-lg bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="language">language</span>
</div>
<div class="w-12 h-12 rounded-lg bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="help_outline">help_outline</span>
</div>
</div>
</div>
</main>
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-primary via-secondary to-tertiary opacity-40"></div>
</body></html>
